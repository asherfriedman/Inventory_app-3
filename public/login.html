<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17684f">
  <title>Inventory App Login</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="login" data-public="true">
  <div class="login-shell">
    <div class="login-card">
      <div class="brand-badge">🔐 Inventory Gate</div>
      <h1 class="brand-title">Inventory App</h1>
      <p class="brand-sub">Enter your PIN to open the app. If no PIN is configured yet, the first PIN can be saved here.</p>
      <form id="loginForm" class="form-grid" style="margin-top:14px;">
        <label class="label">PIN
          <input id="pinInput" class="input" type="password" inputmode="numeric" autocomplete="one-time-code" minlength="4" maxlength="32" required>
        </label>
        <div class="row">
          <button class="btn btn-primary grow" type="submit" id="loginSubmit">Open App</button>
          <button class="btn hidden" type="button" id="setupPinBtn">Set PIN</button>
        </div>
        <div id="loginMessage" class="tiny muted"></div>
      </form>
    </div>
  </div>
  <div class="toast-stack" id="toastStack" aria-live="polite"></div>
  <script defer src="/lib/sql-wasm.js"></script>
  <script defer src="/js/local-db.js"></script>
  <script defer src="/js/app.js"></script>
  <script defer src="/js/login.js"></script>
</body>
</html>
