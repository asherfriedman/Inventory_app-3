<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17684f">
  <title>Product</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="good-form">
  <div class="app-shell">
    <header class="topbar">
      <div class="row">
        <button class="icon-btn" onclick="history.back()" aria-label="Back">←</button>
        <h1 id="goodFormTitle">New Product</h1>
      </div>
    </header>
    <main class="page">
      <form id="goodForm" class="card form-grid">
        <input type="hidden" id="goodId">
        <label class="label">Name <input class="input" id="goodName" required></label>
        <label class="label">Barcode <input class="input" id="goodBarcode"></label>
        <div class="toolbar-inline two">
          <label class="label">Group <select class="select" id="goodGroup"></select></label>
          <label class="label">Measure <input class="input" id="goodMeasure" placeholder="pcs"></label>
        </div>
        <div class="toolbar-inline two">
          <label class="label">Current Qty <input class="input" id="goodQty" type="number" inputmode="decimal" step="0.01"></label>
          <label class="label">Avg Cost <input class="input" id="goodAvgCost" type="number" inputmode="decimal" step="0.01"></label>
        </div>
        <div class="footer-actions two">
          <button class="btn btn-primary" type="submit" id="goodSaveBtn">Save</button>
          <button class="btn btn-danger hidden" type="button" id="goodDeleteBtn">Delete</button>
        </div>
      </form>
      <section class="card">
        <div class="row between"><h2>Transaction History</h2><span class="tiny muted" id="goodHistoryCount">0 docs</span></div>
        <div class="list" id="goodHistoryList"></div>
      </section>
    </main>
  </div>
  <div class="toast-stack" id="toastStack" aria-live="polite"></div>
  <script defer src="/js/app.js"></script>
  <script defer src="/js/good-form.js"></script>
</body>
</html>
