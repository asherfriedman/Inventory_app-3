<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17684f">
  <title>Documents</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="documents">
  <div class="app-shell">
    <header class="topbar">
      <div class="row">
        <button class="icon-btn" onclick="history.back()" aria-label="Back">←</button>
        <h1>Documents</h1>
      </div>
      <div class="actions">
        <a class="icon-btn" href="/document-form.html?type=1" aria-label="New incoming">📥</a>
        <a class="icon-btn" href="/document-form.html?type=2" aria-label="New outgoing">📤</a>
      </div>
    </header>
    <main class="page">
      <section class="card toolbar">
        <div class="toolbar-inline two">
          <select class="select" id="docTypeFilter">
            <option value="">All Types</option>
            <option value="1">Incoming</option>
            <option value="2">Outgoing</option>
          </select>
          <button class="btn btn-soft" id="docRefreshBtn" type="button">Refresh</button>
        </div>
        <div class="toolbar-inline two">
          <label class="label">From <input class="input" id="docDateFrom" type="date"></label>
          <label class="label">To <input class="input" id="docDateTo" type="date"></label>
        </div>
      </section>
      <section class="card">
        <div class="row between"><h2>Document List</h2><span class="tiny muted" id="documentsCountLabel">0 docs</span></div>
        <div class="list" id="documentsList"></div>
      </section>
    </main>
  </div>
  <div class="toast-stack" id="toastStack" aria-live="polite"></div>
  <script defer src="/js/app.js"></script>
  <script defer src="/js/documents.js"></script>
</body>
</html>
