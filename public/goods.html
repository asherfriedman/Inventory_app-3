<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17684f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Goods</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="goods">
  <div class="app-shell">
    <header class="topbar">
      <div class="row">
        <button class="icon-btn" onclick="history.back()" aria-label="Back">←</button>
        <h1>Goods</h1>
      </div>
      <div class="actions">
        <button class="icon-btn" id="openGroupsBtn" aria-label="Manage groups">🗂️</button>
      </div>
    </header>
    <main class="page">
      <section class="card">
        <div id="goodsExplorer"></div>
      </section>
    </main>
    <a class="btn btn-primary fab" href="good-form.html">+ Add Product</a>
  </div>
  <div class="modal" id="groupsModal" aria-hidden="true">
    <div class="modal-panel">
      <div class="row between">
        <h2 style="margin:0;">Manage Groups</h2>
        <button class="icon-btn" id="closeGroupsBtn" aria-label="Close">✕</button>
      </div>
      <div class="spacer"></div>
      <form id="groupForm" class="form-grid card" style="padding:12px;">
        <input type="hidden" id="groupFormId">
        <label class="label">Name <input class="input" id="groupFormName" required></label>
        <label class="label">Parent Group <select class="select" id="groupFormParent"><option value="">None (parent)</option></select></label>
        <div class="toolbar-inline two">
          <label class="label">Buy Default <input class="input" id="groupFormPriceIn" type="number" inputmode="decimal" step="0.01" min="0"></label>
          <label class="label">Sell Default <input class="input" id="groupFormPriceOut" type="number" inputmode="decimal" step="0.01" min="0"></label>
        </div>
        <div class="toolbar-inline two">
          <button class="btn btn-primary" type="submit" id="groupSaveBtn">Save Group</button>
          <button class="btn" type="button" id="groupFormResetBtn">New</button>
        </div>
      </form>
      <div class="card" style="padding:12px;"><div class="list" id="groupsAdminList"></div></div>
    </div>
  </div>
  <div class="toast-stack" id="toastStack" aria-live="polite"></div>
  <script defer src="lib/sql-wasm.js"></script>
  <script defer src="js/local-db.js"></script>
  <script defer src="js/app.js"></script>
  <script defer src="js/goods.js"></script>
</body>
</html>
