<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17684f">
  <title>Contragents</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="contragents">
  <div class="app-shell">
    <header class="topbar">
      <div class="row">
        <button class="icon-btn" onclick="history.back()" aria-label="Back">←</button>
        <h1>Contragents</h1>
      </div>
    </header>
    <main class="page">
      <section class="card toolbar">
        <div class="contragent-search-wrap">
          <input class="input ctr-input" id="contragentSearch" type="search" inputmode="numeric" placeholder="Search by #..." autocomplete="off">
          <button class="kbd-toggle active" id="kbdToggle" type="button" title="Switch keyboard">123</button>
        </div>
        <div class="toolbar-inline two">
          <select class="select" id="contragentTypeFilter">
            <option value="">All</option>
            <option value="1">Customers</option>
            <option value="0">Suppliers</option>
          </select>
          <button class="btn btn-soft" id="contragentRefreshBtn" type="button">Refresh</button>
        </div>
      </section>
      <section class="card">
        <div class="row between"><h2>Contacts</h2><span class="tiny muted" id="contragentCountLabel">0 items</span></div>
        <div class="list" id="contragentsList"></div>
      </section>
    </main>
    <a class="btn btn-primary fab" href="/contragent-form.html">+ Add</a>
  </div>
  <div class="toast-stack" id="toastStack" aria-live="polite"></div>
  <script defer src="/lib/sql-wasm.js"></script>
  <script defer src="/js/local-db.js"></script>
  <script defer src="/js/app.js"></script>
  <script defer src="/js/contragents.js"></script>
</body>
</html>
